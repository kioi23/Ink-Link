<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InkLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

  <!-- NAVBAR -->
  <nav class="flex justify-between p-4 bg-gray-800">
    <h1 class="text-xl font-bold">InkLink</h1>
    <div>
      <button id="homeBtn">Home</button>
      <button id="artistsBtn">Artists</button>
      <button id="inspirationBtn">Inspiration</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="app" class="p-6">

    <!-- HOME SECTION -->
    <section id="homeSection">
      <h2 class="text-3xl mb-4">Find Your Perfect Tattoo & Artist</h2>

      <!-- SEARCH -->
      <div class="flex gap-2">
        <input id="searchInput" class="p-2 text-black" placeholder="Search artists or styles">
        <select id="styleFilter" class="p-2 text-black">
          <option value="">All Styles</option>
          <option value="minimal">Minimal</option>
          <option value="tribal">Tribal</option>
        </select>
        <button id="searchBtn" class="bg-blue-500 px-4">Search</button>
      </div>

      <!-- RESULTS -->
      <div id="results" class="grid grid-cols-3 gap-4 mt-6"></div>
    </section>

    <!-- BOOKING SECTION -->
     <form id="bookingForm">
       <input type="text" placeholder="Tattoo idea" required>
       <input type="text" placeholder="Placement" required>
       <button type="submit">Book</button>
     </form>

  </main>

  <script src="script.js"></script>
</body>
</html>
